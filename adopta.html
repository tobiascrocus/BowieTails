<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Adopción</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <link rel="icon" href="icons/logo.png" type="image/png" />
</head>
<body>
    <header>
        <nav>
            <div class="navContainer">
                <div class="logoNombre">
                    <a href="index.html" class="logoEmpresa"><img src="icons/logo.png" alt="Logo de Bowie & Tails" /></a>
                    <span class="nombreEmpresa">Bowie & Tails</span>
                </div>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="adopta.html" class="activo">Adopta</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main class="contenido">
        <h1>Adopta un Border Collie</h1>
        <section class="formularios">
            <form action="formularioEnviado.html" method="get">
                <fieldset>
                    <legend>Información personal</legend>

                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre..." required />

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido..." required />

                    <label for="dni">DNI</label>
                    <input type="text" id="dni" name="dni" placeholder="Ingrese su DNI..." required />

                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Ingrese su email..." required />

                    <label for="telefono">Teléfono de contacto</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ingrese su teléfono..." required />

                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" name="ciudad" placeholder="Ingrese su ciudad..." required />

                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Ingrese su dirección..." required />
                </fieldset>
                <fieldset>
                    <legend>Situación y experiencia</legend>
                    <label for="vivienda">Tipo de vivienda</label>
                    <select id="vivienda" name="vivienda" required>
                        <option value="">Seleccione...</option>
                        <option value="casa">Casa</option>
                        <option value="departamento">Departamento</option>
                        <option value="otro">Otro</option>
                    </select>

                    <label for="espacio">¿Tiene patio o espacio al aire libre?</label>
                    <select id="espacio" name="espacio" required>
                        <option value="">Seleccione...</option>
                        <option value="si">Sí</option>
                        <option value="no">No</option>
                    </select>

                    <label for="mascotas">¿Tiene otras mascotas?</label>
                    <select id="mascotas" name="mascotas" required>
                        <option value="">Seleccione...</option>
                        <option value="ninguna">Ninguna</option>
                        <option value="perro">Perro(s)</option>
                        <option value="gato">Gato(s)</option>
                        <option value="otros">Otros</option>
                    </select>

                    <label for="experiencia">¿Tiene experiencia cuidando perros?</label>
                    <select id="experiencia" name="experiencia" required>
                        <option value="">Seleccione...</option>
                        <option value="si">Sí</option>
                        <option value="no">No</option>
                    </select>

                    <label for="motivo">¿Por qué desea adoptar un perro?</label>
                    <textarea id="motivo" name="motivo" placeholder="Escriba su motivo..." rows="4" required></textarea>
                </fieldset>
                <button type="submit">Enviar solicitud</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="redes">
            <a href="https://facebook.com" target="_blank"><img src="icons/facebook.png" alt="Logo de Facebook"></a>
            <a href="https://x.com" target="_blank"><img src="icons/x.png" alt="Logo de X"></a>
            <a href="https://instagram.com" target="_blank"><img src="icons/instagram.png" alt="Logo de Instagram"></a>
        </div>
        <div class="texto">
            <p>Desarrollado por Tobias Tinaro | © Bowie & Tails</p>
        </div>
    </footer>
</body>
</html>
